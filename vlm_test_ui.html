<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SwiftLM VLM UI Tester</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; background: #f5f5f7; color: #1d1d1f; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .image-preview { width: 100%; max-height: 400px; object-fit: contain; margin-top: 15px; border-radius: 8px; border: 1px dashed #ccc; padding: 5px; }
        .prediction-box { margin-top: 20px; padding: 15px; background: #f0fdf4; border-left: 4px solid #22c55e; border-radius: 4px; display: none; }
        .loading { color: #f59e0b; font-weight: bold; display: none; margin-top: 15px; }
        input[type="file"] { display: block; margin-bottom: 10px; }
        button { background: #0071e3; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 16px; cursor: pointer; }
        button:hover { background: #0077ed; }
        button:disabled { background: #99c8f6; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SwiftLM Vision Tester</h1>
        <p>Test the active SwiftLM VLM running on port 5431 natively.</p>
        
        <input type="file" id="imageInput" accept="image/*">
        <textarea id="promptInput" style="width: 100%; height: 60px; margin: 10px 0; padding: 10px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box;" placeholder="Enter prompt here...">Describe this image in detail.</textarea>
        <button id="analyzeBtn" disabled>Analyze Image</button>
        
        <img id="preview" class="image-preview" style="display: none;">
        
        <div id="loading" class="loading">Generating prediction via SwiftLM... (Check console if taking long)</div>
        <div id="result" class="prediction-box"></div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const promptInput = document.getElementById('promptInput');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        
        let base64Image = '';

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                    base64Image = event.target.result.split(',')[1];
                    analyzeBtn.disabled = false;
                };
                reader.readAsDataURL(file);
            }
        });

        analyzeBtn.addEventListener('click', async () => {
            analyzeBtn.disabled = true;
            loading.style.display = 'block';
            result.style.display = 'none';
            
            try {
                const response = await fetch('http://127.0.0.1:5431/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'vlm-test',
                        messages: [{
                            role: 'user',
                            content: [
                                { type: 'text', text: promptInput.value },
                                { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${base64Image}` } }
                            ]
                        }],
                        max_tokens: 300
                    })
                });
                
                const data = await response.json();
                
                let content = data.choices[0].message.content;
                content = content.replace(/\n/g, '<br/>');
                
                result.innerHTML = '<strong>Prediction:</strong><br/>' + content;
                result.style.display = 'block';
            } catch (err) {
                result.innerHTML = '<span style="color:red;">Error connecting to SwiftLM (Is it running on port 5431?): ' + err.message + '</span>';
                result.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
